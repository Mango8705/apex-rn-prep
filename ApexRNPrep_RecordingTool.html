<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex RN Prep — Recording Link Generator</title>
<script src="https://alcdn.msftauth.net/browser/3.7.0/js/msal-browser.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#eef2f7;min-height:100vh;padding:28px 20px;display:flex;align-items:flex-start;justify-content:center}
.app{max-width:560px;width:100%}
.panel{background:white;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.09);padding:28px 26px;margin-bottom:18px}
.panel h2{font-size:18px;font-weight:700;color:#1a2d5a}
.version{font-size:11px;color:#9ca3af;margin-top:3px}
hr{border:none;border-top:1px solid #e5e7eb;margin:14px 0}
label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;margin-top:13px}
input:not([type="radio"]):not([type="checkbox"]),select{width:100%;padding:10px 12px;font-size:14px;border:1px solid #d1d5db;border-radius:8px;font-family:inherit}
input:focus,select:focus{border-color:#1a2d5a;outline:none}
.row{display:flex;gap:10px}
.row > *{flex:1}
.btn{width:100%;padding:12px;background:#1a2d5a;color:white;font-size:14px;font-weight:700;border:none;border-radius:10px;cursor:pointer;margin-top:10px;font-family:inherit}
.btn:hover{background:#243e7a}
.btn-secondary{background:#0e7c66}
.btn-secondary:hover{background:#0a5d4d}
.btn-grey{background:#6b7280}
.btn-grey:hover{background:#4b5563}
.back-link{display:block;text-align:center;margin-top:14px;font-size:12px;color:#9ca3af;text-decoration:none}
#status{font-size:13px;margin-top:10px;padding:10px;border-radius:6px;display:none}
#status.info{background:#eff6ff;color:#1e40af;display:block}
#status.success{background:#ecfdf5;color:#065f46;display:block}
#status.error{background:#fef2f2;color:#991b1b;display:block;white-space:pre-wrap}
#signedAs{font-size:12px;color:#6b7280;margin-bottom:10px}
#signedAs strong{color:#1a2d5a}
.file-option{display:flex;padding:10px;border:1px solid #d1d5db;border-radius:8px;margin-bottom:8px;cursor:pointer}
.file-option.selected{border-color:#1a2d5a;background:#eff6ff}
.file-option input[type="radio"]{width:auto;margin-right:10px;margin-top:3px;flex-shrink:0}
.file-info{flex:1}
.file-name{font-size:13px;font-weight:600;color:#1a2d5a;word-break:break-word}
.file-meta{font-size:11px;color:#6b7280;margin-top:3px}
.added-item{display:flex;align-items:center;padding:8px 10px;background:#f0fdf4;border:1px solid #86efac;border-radius:8px;margin-bottom:6px}
.added-item .meta{flex:1}
.added-item .date{font-size:11px;color:#065f46;font-weight:700}
.added-item .name{font-size:12px;color:#1a2d5a;word-break:break-word;margin-top:2px}
.added-item button{background:#dc2626;color:white;border:none;width:24px;height:24px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:700;margin-left:8px;flex-shrink:0}
.passcode-box{background:#fff7ed;border:2px solid #fb923c;border-radius:10px;padding:14px;margin-top:14px;text-align:center}
.passcode-label{font-size:11px;font-weight:700;color:#9a3412;text-transform:uppercase}
.passcode-value{font-size:28px;font-weight:700;color:#9a3412;font-family:'Courier New',monospace;letter-spacing:0.1em;margin:6px 0}
.copy-btn{background:#fb923c;color:white;padding:6px 14px;border-radius:6px;font-size:12px;border:none;cursor:pointer}
.link-box{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:10px;margin-top:12px;font-size:11px;color:#166534;word-break:break-all}
.link-box .one-link{margin-bottom:8px;padding-bottom:8px;border-bottom:1px dashed #86efac}
.link-box .one-link:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.hidden{display:none}
</style>
</head>
<body>
<div class="app">
  <div class="panel" id="signinPanel">
    <h2>Recording Link Generator</h2>
    <p class="version">v9 &mdash; May 2026</p>
    <hr>
    <p style="font-size:13px;color:#374151;margin-bottom:8px">Sign in with your Apex RN Prep account.</p>
    <button class="btn" id="signinBtn">Sign in with Microsoft</button>
    <div id="loadStatus" style="font-size:11px;color:#6b7280;text-align:center;margin-top:8px">Initializing&hellip;</div>
    <a class="back-link" href="ApexRNPrep_Hub.html">&larr; Back to Hub</a>
  </div>

  <div class="panel hidden" id="mainPanel">
    <h2>Generate Recording Link</h2>
    <p class="version">v9 &mdash; May 2026</p>
    <div id="signedAs"></div>
    <hr>

    <label>Search by</label>
    <div class="row" style="gap:8px;margin-bottom:8px">
      <label style="display:flex;align-items:center;font-weight:400;margin:0;cursor:pointer">
        <input type="radio" name="searchMode" value="date" id="modeDate" checked style="width:auto;margin-right:6px"> Date
      </label>
      <label style="display:flex;align-items:center;font-weight:400;margin:0;cursor:pointer">
        <input type="radio" name="searchMode" value="topic" id="modeTopic" style="width:auto;margin-right:6px"> Topic / filename
      </label>
    </div>

    <div id="dateSearchRow">
      <label>Class Date</label>
      <input type="date" id="classDate">
    </div>

    <div id="topicSearchRow" class="hidden">
      <label>Topic keyword (matches filename)</label>
      <input type="text" id="topicQuery" placeholder="e.g. Cardiac, Pharmacology, Maternity">
    </div>

    <button class="btn btn-secondary" id="findBtn">Find &amp; Add Recording</button>
    <div id="status"></div>

    <div id="pickerContainer" class="hidden">
      <hr>
      <label id="pickerLabel">Confirm recording to add:</label>
      <div id="fileList"></div>
      <div class="row">
        <button class="btn btn-secondary" id="addPickedBtn">Add to List</button>
        <button class="btn btn-grey" id="cancelPickerBtn">Cancel</button>
      </div>
    </div>

    <hr>
    <label>Recordings to send (review before generating)</label>
    <div id="addedList" style="min-height:50px;border:1px dashed #d1d5db;border-radius:8px;padding:8px;background:#fafbfc"></div>
    <div id="addedEmptyHint" style="font-size:11px;color:#9ca3af;text-align:center;padding:8px">No recordings added yet. Find one above.</div>

    <hr>
    <label>Student Email</label>
    <input type="email" id="studentEmail" placeholder="student@example.com">

    <label>Link expires in (days)</label>
    <input type="number" id="expiryDays" value="3" min="1" max="30">

    <button class="btn" id="generateBtn">Generate Links &amp; Open Email Draft</button>

    <div id="resultContainer" class="hidden">
      <hr>
      <div class="passcode-box">
        <div class="passcode-label">Text this passcode to the student</div>
        <div class="passcode-value" id="passcodeValue">------</div>
        <button class="copy-btn" id="copyBtn">Copy passcode</button>
      </div>
      <div class="link-box" id="linkValue"></div>
      <button class="btn" id="emailBtn" style="margin-top:10px">Open Email Draft</button>
      <button class="btn btn-grey" id="resetBtn">Start Over</button>
    </div>

    <a class="back-link" href="ApexRNPrep_Hub.html">&larr; Back to Hub</a>
  </div>
</div>

<script>
var CLIENT_ID = "5bd0113e-5f89-4b38-a79c-90bdd9820835";
var TENANT_ID = "9a563a66-0f9f-420d-b287-41c2466f2fab";
var REDIRECT_URI = "https://mango8705.github.io/apex-rn-prep/ApexRNPrep_RecordingTool.html";
var RECORDINGS_FOLDER = "Recordings";
var SCOPES = ["Files.ReadWrite.All", "User.Read"];

var msalInstance = null;
var currentAccount = null;
var pickerCandidates = [];
var pickerSelectedIdx = null;
var addedRecordings = [];  // {date, file}
var lastResult = null;

function el(id){ return document.getElementById(id); }

function setLoadStatus(m){ var e = el("loadStatus"); if (e) e.textContent = m; }
function setStatus(m, t){ var e = el("status"); e.className = t || "info"; e.textContent = m; }
function clearStatus(){ var e = el("status"); e.className = ""; e.textContent = ""; }

function loadFallback(){
  return new Promise(function(res, rej){
    var s = document.createElement("script");
    s.src = "https://unpkg.com/@azure/msal-browser@3/lib/msal-browser.min.js";
    s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

async function init(){
  try {
    setLoadStatus("Loading sign-in library…");
    if (typeof msal === "undefined") {
      try { await loadFallback(); }
      catch(e){ setLoadStatus("Failed to load library."); return; }
    }
    if (typeof msal === "undefined") { setLoadStatus("Library not available."); return; }
    msalInstance = new msal.PublicClientApplication({
      auth: { clientId: CLIENT_ID, authority: "https://login.microsoftonline.com/" + TENANT_ID, redirectUri: REDIRECT_URI },
      cache: { cacheLocation: "sessionStorage" }
    });
    await msalInstance.initialize();
    try { await msalInstance.handleRedirectPromise(); } catch(e){}
    var accs = msalInstance.getAllAccounts();
    if (accs.length > 0) { currentAccount = accs[0]; showMain(); }
    else { setLoadStatus("Ready. Click Sign in."); }
    var d = el("classDate"); if (d) d.valueAsDate = new Date();
  } catch(e){ setLoadStatus("Init error: " + e.message); }
}

async function signIn(){
  if (!msalInstance) { setLoadStatus("Library not ready, reload."); return; }
  try {
    var r = await msalInstance.loginPopup({ scopes: SCOPES });
    currentAccount = r.account;
    showMain();
  } catch(e){ setLoadStatus("Sign-in failed: " + e.message); }
}

function showMain(){
  el("signinPanel").classList.add("hidden");
  el("mainPanel").classList.remove("hidden");
  el("signedAs").innerHTML = "Signed in as <strong>" + currentAccount.username + "</strong>";
}

async function getToken(){
  try {
    var r = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: currentAccount });
    return r.accessToken;
  } catch(e){
    var r2 = await msalInstance.acquireTokenPopup({ scopes: SCOPES });
    return r2.accessToken;
  }
}

function fmtSize(b){
  if (!b) return "";
  if (b < 1048576) return (b/1024).toFixed(0) + " KB";
  if (b < 1073741824) return (b/1048576).toFixed(1) + " MB";
  return (b/1073741824).toFixed(2) + " GB";
}
function fmtDate(iso){ return new Date(iso).toLocaleString(); }
function esc(s){ return s.replace(/[&<>"']/g, function(c){ return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c]; }); }
function makePasscode(){
  var chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789", code = "";
  for (var i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

async function findRecording(){
  var mode = document.querySelector('input[name="searchMode"]:checked').value;
  el("pickerContainer").classList.add("hidden");
  setStatus("Searching OneDrive…", "info");
  try {
    var token = await getToken();
    var url = "https://graph.microsoft.com/v1.0/me/drive/root:/" + encodeURIComponent(RECORDINGS_FOLDER) + ":/children?$top=200";
    var resp = await fetch(url, { headers: { Authorization: "Bearer " + token } });
    if (!resp.ok) { var err = await resp.text(); throw new Error("Graph " + resp.status + ": " + err); }
    var data = await resp.json();
    var all = (data.value || []).filter(function(f){ return f.file; });
    var matches = [];
    if (mode === "date") {
      var dateStr = el("classDate").value;
      if (!dateStr) { setStatus("Pick a class date first.", "error"); return; }
      var target = new Date(dateStr + "T00:00:00");
      var targetEnd = new Date(target.getTime() + 86400000);
      matches = all.filter(function(f){
        var c = new Date(f.createdDateTime);
        return c >= target && c < targetEnd;
      });
      if (matches.length === 0) {
        setStatus("No recordings created on " + dateStr + ". Folder has " + all.length + " files total.", "error");
        return;
      }
    } else {
      var q = el("topicQuery").value.trim().toLowerCase();
      if (!q) { setStatus("Enter a topic keyword first.", "error"); return; }
      matches = all.filter(function(f){ return f.name.toLowerCase().indexOf(q) !== -1; });
      if (matches.length === 0) {
        setStatus("No recordings with \"" + q + "\" in the filename. Folder has " + all.length + " files total.", "error");
        return;
      }
    }
    pickerCandidates = matches;
    pickerSelectedIdx = matches.length === 1 ? 0 : null;
    renderPicker();
    el("pickerContainer").classList.remove("hidden");
    clearStatus();
  } catch(e){ setStatus("Error: " + e.message, "error"); }
}

function renderPicker(){
  var lbl = el("pickerLabel");
  if (lbl) lbl.textContent = pickerCandidates.length === 1
    ? "Confirm recording to add:"
    : "Multiple recordings for that date — pick one:";
  var list = el("fileList");
  list.innerHTML = "";
  pickerCandidates.forEach(function(f, i){
    var div = document.createElement("div");
    div.className = "file-option" + (pickerSelectedIdx === i ? " selected" : "");
    div.onclick = function(){ pickerSelectedIdx = i; renderPicker(); };
    div.innerHTML =
      "<input type=\"radio\" name=\"fc\" " + (pickerSelectedIdx === i ? "checked" : "") + ">" +
      "<div class=\"file-info\">" +
        "<div class=\"file-name\">" + esc(f.name) + "</div>" +
        "<div class=\"file-meta\">Created " + fmtDate(f.createdDateTime) + " &middot; " + fmtSize(f.size) + "</div>" +
      "</div>";
    list.appendChild(div);
  });
}

function addPicked(){
  if (pickerSelectedIdx === null) { setStatus("Pick a recording first.", "error"); return; }
  var file = pickerCandidates[pickerSelectedIdx];
  // Always use the recording's actual creation date (YYYY-MM-DD), regardless of search mode
  var dateStr = new Date(file.createdDateTime).toISOString().substring(0, 10);
  // Prevent duplicate of same file
  if (addedRecordings.some(function(a){ return a.file.id === file.id; })) {
    setStatus("That recording is already in the list.", "error");
    return;
  }
  addRecording(dateStr, file);
  el("pickerContainer").classList.add("hidden");
}

function cancelPicker(){
  el("pickerContainer").classList.add("hidden");
  pickerCandidates = [];
  pickerSelectedIdx = null;
  clearStatus();
}

function addRecording(dateStr, file){
  addedRecordings.push({ date: dateStr, file: file });
  renderAdded();
  setStatus("Added " + file.name + " (" + dateStr + ")", "success");
  // Bump date forward by a day for convenience
  var d = el("classDate"); var dt = new Date(d.value);
  dt.setDate(dt.getDate() + 1);
  d.valueAsDate = dt;
}

function renderAdded(){
  var list = el("addedList");
  list.innerHTML = "";
  addedRecordings.forEach(function(item, i){
    var div = document.createElement("div");
    div.className = "added-item";
    div.innerHTML =
      "<div class=\"meta\">" +
        "<div class=\"date\">" + item.date + "</div>" +
        "<div class=\"name\">" + esc(item.file.name) + "</div>" +
      "</div>" +
      "<button title=\"Remove\">&times;</button>";
    div.querySelector("button").onclick = function(){ removeAt(i); };
    list.appendChild(div);
  });
  var hint = el("addedEmptyHint");
  if (hint) hint.style.display = addedRecordings.length === 0 ? "block" : "none";
}

function removeAt(i){
  addedRecordings.splice(i, 1);
  renderAdded();
}

async function generateAll(){
  if (addedRecordings.length === 0) { setStatus("Add at least one recording first.", "error"); return; }
  var email = el("studentEmail").value.trim();
  if (!email) { setStatus("Enter the student email first.", "error"); return; }
  var daysVal = parseInt(el("expiryDays").value, 10);
  if (isNaN(daysVal) || daysVal < 1) { setStatus("Enter a valid number of days.", "error"); return; }
  setStatus("Creating " + addedRecordings.length + " share link(s)…", "info");
  try {
    var token = await getToken();
    var passcode = makePasscode();
    var expiry = new Date(Date.now() + daysVal * 86400000);
    var links = [];
    for (var i = 0; i < addedRecordings.length; i++) {
      var item = addedRecordings[i];
      var resp = await fetch("https://graph.microsoft.com/v1.0/me/drive/items/" + item.file.id + "/createLink", {
        method: "POST",
        headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" },
        body: JSON.stringify({ type: "view", scope: "anonymous", password: passcode, expirationDateTime: expiry.toISOString() })
      });
      if (!resp.ok) { var err = await resp.text(); throw new Error("createLink " + resp.status + " for " + item.file.name + ": " + err); }
      var data = await resp.json();
      links.push({ date: item.date, name: item.file.name, url: data.link.webUrl });
    }
    lastResult = { links: links, passcode: passcode, email: email, expiry: expiry, days: daysVal };
    clearStatus();
    showResult();
  } catch(e){ setStatus("Error: " + e.message, "error"); }
}

function showResult(){
  el("passcodeValue").textContent = lastResult.passcode;
  var box = el("linkValue");
  box.innerHTML = "";
  lastResult.links.forEach(function(l){
    var div = document.createElement("div");
    div.className = "one-link";
    div.innerHTML =
      "<strong>" + l.date + ":</strong> <a href=\"" + l.url + "\" target=\"_blank\">" + l.url + "</a>";
    box.appendChild(div);
  });
  var exp = document.createElement("div");
  exp.innerHTML = "<strong>All links expire on:</strong> " + lastResult.expiry.toLocaleString();
  box.appendChild(exp);
  el("resultContainer").classList.remove("hidden");
  setTimeout(openEmail, 200);
}

function openEmail(){
  if (!lastResult) return;
  var subject = "Apex RN Prep — Class Recording" + (lastResult.links.length > 1 ? "s" : "");
  var lines = [];
  lines.push("Hi,");
  lines.push("");
  lines.push("Here " + (lastResult.links.length > 1 ? "are the links" : "is the link") + " to your class recording" + (lastResult.links.length > 1 ? "s" : "") + ":");
  lines.push("");
  lastResult.links.forEach(function(l){
    lines.push(l.date + ":");
    lines.push(l.url);
    lines.push("");
  });
  lines.push("The passcode (same for all links above) will be sent separately via text.");
  lines.push("Links expire on " + lastResult.expiry.toLocaleString() + " (" + lastResult.days + " day" + (lastResult.days > 1 ? "s" : "") + " from now).");
  lines.push("");
  lines.push("— Apex RN Prep");
  var body = lines.join("\n");
  var gmailUrl = "https://mail.google.com/mail/?view=cm&fs=1" +
    "&to=" + encodeURIComponent(lastResult.email) +
    "&su=" + encodeURIComponent(subject) +
    "&body=" + encodeURIComponent(body);
  window.open(gmailUrl, "_blank");
}

function copyPasscode(){
  if (!lastResult) return;
  navigator.clipboard.writeText(lastResult.passcode).then(function(){
    setStatus("Passcode copied. Text it to the student.", "success");
  });
}

function resetAll(){
  addedRecordings = [];
  pickerCandidates = [];
  pickerSelectedIdx = null;
  lastResult = null;
  el("pickerContainer").classList.add("hidden");
  el("resultContainer").classList.add("hidden");
  el("studentEmail").value = "";
  el("expiryDays").value = "3";
  var d = el("classDate"); if (d) d.valueAsDate = new Date();
  clearStatus();
}

function updateSearchMode(){
  var mode = document.querySelector('input[name="searchMode"]:checked').value;
  el("dateSearchRow").classList.toggle("hidden", mode !== "date");
  el("topicSearchRow").classList.toggle("hidden", mode !== "topic");
}

document.addEventListener("DOMContentLoaded", function(){
  el("signinBtn").addEventListener("click", signIn);
  el("findBtn").addEventListener("click", findRecording);
  el("modeDate").addEventListener("change", updateSearchMode);
  el("modeTopic").addEventListener("change", updateSearchMode);
  el("addPickedBtn").addEventListener("click", addPicked);
  el("cancelPickerBtn").addEventListener("click", cancelPicker);
  el("generateBtn").addEventListener("click", generateAll);
  el("emailBtn").addEventListener("click", openEmail);
  el("copyBtn").addEventListener("click", copyPasscode);
  el("resetBtn").addEventListener("click", resetAll);
  init();
});
</script>
</body>
</html>
