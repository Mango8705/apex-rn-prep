<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex RN Prep — Recording Link Generator</title>
<script src="https://alcdn.msauth.net/browser/3.7.0/js/msal-browser.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#eef2f7;min-height:100vh;padding:28px 20px;display:flex;align-items:flex-start;justify-content:center}
.app{max-width:540px;width:100%}
.panel{background:white;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.09);padding:28px 26px;margin-bottom:18px}
.panel h2{font-size:18px;font-weight:700;color:#1a2d5a}
.version{font-size:11px;color:#9ca3af;margin-top:3px}
hr{border:none;border-top:1px solid #e5e7eb;margin:14px 0}
label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;margin-top:13px}
input,select{width:100%;padding:10px 12px;font-size:14px;border:1px solid #d1d5db;border-radius:8px;font-family:inherit}
input:focus,select:focus{border-color:#1a2d5a;outline:none}
.btn{width:100%;padding:12px;background:#1a2d5a;color:white;font-size:14px;font-weight:700;border:none;border-radius:10px;cursor:pointer;margin-top:16px;font-family:inherit;transition:background .2s}
.btn:hover{background:#243e7a}
.btn:disabled{background:#9ca3af;cursor:not-allowed}
.btn-secondary{background:#0e7c66}
.btn-secondary:hover{background:#0a5d4d}
.back-link{display:block;text-align:center;margin-top:14px;font-size:12px;color:#9ca3af;text-decoration:none}
.back-link:hover{color:#1a2d5a}
#status{font-size:13px;margin-top:10px;padding:10px;border-radius:6px;display:none}
#status.info{background:#eff6ff;color:#1e40af;display:block}
#status.success{background:#ecfdf5;color:#065f46;display:block}
#status.error{background:#fef2f2;color:#991b1b;display:block}
#signedAs{font-size:12px;color:#6b7280;margin-bottom:10px}
#signedAs strong{color:#1a2d5a}
.file-option{display:flex;align-items:flex-start;padding:10px;border:1px solid #d1d5db;border-radius:8px;margin-bottom:8px;cursor:pointer}
.file-option:hover{background:#f9fafb}
.file-option.selected{border-color:#1a2d5a;background:#eff6ff}
.file-option input[type="radio"]{margin-right:10px;margin-top:3px}
.file-info{flex:1}
.file-name{font-size:13px;font-weight:600;color:#1a2d5a;word-break:break-word}
.file-meta{font-size:11px;color:#6b7280;margin-top:3px}
.passcode-box{background:#fff7ed;border:2px solid #fb923c;border-radius:10px;padding:14px;margin-top:14px;text-align:center}
.passcode-label{font-size:11px;font-weight:700;color:#9a3412;text-transform:uppercase;letter-spacing:0.05em}
.passcode-value{font-size:28px;font-weight:700;color:#9a3412;font-family:'Courier New',monospace;letter-spacing:0.1em;margin:6px 0}
.copy-btn{display:inline-block;background:#fb923c;color:white;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;border:none;cursor:pointer;margin-top:4px}
.copy-btn:hover{background:#ea7c1b}
.link-box{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:10px;margin-top:12px;font-size:11px;color:#166534;word-break:break-all}
.hidden{display:none}
</style>
</head>
<body>
<div class="app">
  <!-- Sign-in panel -->
  <div class="panel" id="signinPanel">
    <h2>Recording Link Generator</h2>
    <p class="version">v1 &mdash; May 2026</p>
    <hr>
    <p style="font-size:13px;color:#374151;margin-bottom:8px">Sign in with your Apex RN Prep account to access recordings.</p>
    <button class="btn" onclick="signIn()">Sign in with Microsoft</button>
    <a class="back-link" href="ApexRNPrep_Hub.html">&larr; Back to Hub</a>
  </div>

  <!-- Main tool panel (hidden until signed in) -->
  <div class="panel hidden" id="mainPanel">
    <h2>Generate Recording Link</h2>
    <p class="version">v1 &mdash; May 2026</p>
    <div id="signedAs"></div>
    <hr>

    <label>Class Date</label>
    <input type="date" id="classDate">

    <label>Student Email</label>
    <input type="email" id="studentEmail" placeholder="student@example.com">

    <button class="btn" onclick="findRecordings()" id="findBtn">Find Recording</button>
    <div id="status"></div>

    <div id="filesContainer" class="hidden">
      <hr>
      <label>Select recording (multiple found for that date)</label>
      <div id="fileList"></div>
      <button class="btn btn-secondary" onclick="generateLinkAndEmail()" id="generateBtn">Generate Link &amp; Open Email Draft</button>
    </div>

    <div id="resultContainer" class="hidden">
      <hr>
      <div class="passcode-box">
        <div class="passcode-label">Text this passcode to the student</div>
        <div class="passcode-value" id="passcodeValue">------</div>
        <button class="copy-btn" onclick="copyPasscode()">Copy passcode</button>
      </div>
      <div class="link-box" id="linkValue"></div>
      <button class="btn" onclick="openEmailDraft()" style="margin-top:10px">Open Email Draft</button>
      <button class="btn" onclick="resetForm()" style="background:#6b7280;margin-top:8px">Generate Another</button>
    </div>

    <a class="back-link" href="ApexRNPrep_Hub.html">&larr; Back to Hub</a>
  </div>
</div>

<script>
const CONFIG = {
  clientId: "5bd0113e-5f89-4b38-a79c-90bdd9820835",
  tenantId: "9a563a66-0f9f-420d-b287-41c2466f2fab",
  redirectUri: "https://mango8705.github.io/apex-rn-prep/ApexRNPrep_RecordingTool.html",
  recordingsFolder: "Recordings",  // path in /me/drive/root
  linkExpiryDays: 3,
};

const msalConfig = {
  auth: {
    clientId: CONFIG.clientId,
    authority: `https://login.microsoftonline.com/${CONFIG.tenantId}`,
    redirectUri: CONFIG.redirectUri,
  },
  cache: { cacheLocation: "sessionStorage" },
};
const loginRequest = { scopes: ["Files.ReadWrite.All", "User.Read"] };
let msalInstance = null;
let currentAccount = null;
let candidateFiles = [];
let selectedFile = null;
let lastResult = null;

window.addEventListener('load', async ()=>{
  msalInstance = new msal.PublicClientApplication(msalConfig);
  await msalInstance.initialize();
  // Try to handle a redirect, then check existing accounts
  await msalInstance.handleRedirectPromise().catch(e=>{});
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) {
    currentAccount = accounts[0];
    showMainPanel();
  }
  // Default date to today
  const today = new Date();
  document.getElementById('classDate').valueAsDate = today;
});

async function signIn(){
  try {
    const result = await msalInstance.loginPopup(loginRequest);
    currentAccount = result.account;
    showMainPanel();
  } catch (e) {
    setStatus('Sign-in failed: ' + e.message, 'error');
  }
}

function showMainPanel(){
  document.getElementById('signinPanel').classList.add('hidden');
  document.getElementById('mainPanel').classList.remove('hidden');
  document.getElementById('signedAs').innerHTML = `Signed in as <strong>${currentAccount.username}</strong>`;
}

async function getToken(){
  try {
    const resp = await msalInstance.acquireTokenSilent({
      scopes: loginRequest.scopes,
      account: currentAccount,
    });
    return resp.accessToken;
  } catch (e) {
    const resp = await msalInstance.acquireTokenPopup(loginRequest);
    return resp.accessToken;
  }
}

function setStatus(msg, type='info'){
  const el = document.getElementById('status');
  el.className = type;
  el.textContent = msg;
}

function clearStatus(){
  document.getElementById('status').className = '';
  document.getElementById('status').textContent = '';
}

function fmtSize(bytes){
  if (!bytes) return '';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(0) + ' KB';
  if (bytes < 1024*1024*1024) return (bytes/(1024*1024)).toFixed(1) + ' MB';
  return (bytes/(1024*1024*1024)).toFixed(2) + ' GB';
}

function fmtDate(iso){
  const d = new Date(iso);
  return d.toLocaleString();
}

async function findRecordings(){
  const dateStr = document.getElementById('classDate').value;
  if (!dateStr){ setStatus('Pick a class date first.', 'error'); return; }
  document.getElementById('filesContainer').classList.add('hidden');
  document.getElementById('resultContainer').classList.add('hidden');
  setStatus('Searching OneDrive…', 'info');

  try {
    const token = await getToken();
    const folderPath = encodeURIComponent(CONFIG.recordingsFolder);
    // List children, expand top 200, get a few fields
    const url = `https://graph.microsoft.com/v1.0/me/drive/root:/${folderPath}:/children?$top=200&$select=id,name,createdDateTime,lastModifiedDateTime,size,file,folder,webUrl&$orderby=createdDateTime desc`;
    const resp = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    if (!resp.ok){
      const err = await resp.text();
      throw new Error(`Graph API error ${resp.status}: ${err}`);
    }
    const data = await resp.json();
    const all = (data.value || []).filter(f => f.file);  // only files
    // Filter by creation date matching the selected day (local timezone)
    const target = new Date(dateStr + 'T00:00:00');
    const targetEnd = new Date(target.getTime() + 24*3600*1000);
    candidateFiles = all.filter(f => {
      const c = new Date(f.createdDateTime);
      return c >= target && c < targetEnd;
    });

    if (candidateFiles.length === 0){
      setStatus(`No recordings found created on ${dateStr}. Found ${all.length} files in the folder total. Try a different date or check the file's creation date in OneDrive.`, 'error');
      return;
    }
    clearStatus();
    renderFileList();
    document.getElementById('filesContainer').classList.remove('hidden');
    // Auto-select if only one
    if (candidateFiles.length === 1){
      selectFile(0);
    }
  } catch (e) {
    setStatus('Error: ' + e.message, 'error');
  }
}

function renderFileList(){
  const list = document.getElementById('fileList');
  list.innerHTML = '';
  candidateFiles.forEach((f, i)=>{
    const div = document.createElement('div');
    div.className = 'file-option' + (selectedFile === i ? ' selected' : '');
    div.onclick = ()=>selectFile(i);
    div.innerHTML = `
      <input type="radio" name="fileChoice" ${selectedFile === i ? 'checked' : ''}>
      <div class="file-info">
        <div class="file-name">${escapeHtml(f.name)}</div>
        <div class="file-meta">Created ${fmtDate(f.createdDateTime)} · ${fmtSize(f.size)}</div>
      </div>
    `;
    list.appendChild(div);
  });
}

function selectFile(i){
  selectedFile = i;
  renderFileList();
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function generatePasscode(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';  // skip ambiguous chars
  let code = '';
  for (let i = 0; i < 6; i++){
    code += chars[Math.floor(Math.random() * chars.length)];
  }
  return code;
}

async function generateLinkAndEmail(){
  if (selectedFile === null){ setStatus('Pick a recording first.', 'error'); return; }
  const email = document.getElementById('studentEmail').value.trim();
  if (!email){ setStatus('Enter the student email first.', 'error'); return; }
  setStatus('Creating share link…', 'info');

  try {
    const token = await getToken();
    const file = candidateFiles[selectedFile];
    const passcode = generatePasscode();
    const expiry = new Date(Date.now() + CONFIG.linkExpiryDays * 24 * 3600 * 1000);

    const linkResp = await fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${file.id}/createLink`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        type: 'view',
        scope: 'anonymous',
        password: passcode,
        expirationDateTime: expiry.toISOString(),
      }),
    });
    if (!linkResp.ok){
      const err = await linkResp.text();
      throw new Error(`createLink failed ${linkResp.status}: ${err}`);
    }
    const linkData = await linkResp.json();
    const shareUrl = linkData.link.webUrl;

    lastResult = { shareUrl, passcode, email, file, expiry };
    clearStatus();
    showResult();
  } catch (e) {
    setStatus('Error: ' + e.message, 'error');
  }
}

function showResult(){
  document.getElementById('filesContainer').classList.add('hidden');
  document.getElementById('passcodeValue').textContent = lastResult.passcode;
  document.getElementById('linkValue').innerHTML = `<strong>Link:</strong> <a href="${lastResult.shareUrl}" target="_blank">${lastResult.shareUrl}</a><br><strong>Expires:</strong> ${lastResult.expiry.toLocaleString()}`;
  document.getElementById('resultContainer').classList.remove('hidden');
  // Auto-open email draft
  setTimeout(openEmailDraft, 200);
}

function openEmailDraft(){
  const { shareUrl, email, file, expiry } = lastResult;
  const classDateStr = document.getElementById('classDate').value;
  const subject = 'Apex RN Prep — Class Recording';
  const body = `Hi,

Here is the link to the class recording from ${classDateStr}:

${shareUrl}

The passcode will be sent separately via text. The link expires on ${expiry.toLocaleString()}.

— Apex RN Prep`;
  const mailto = `mailto:${encodeURIComponent(email)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.location.href = mailto;
}

function copyPasscode(){
  navigator.clipboard.writeText(lastResult.passcode).then(()=>{
    setStatus('Passcode copied to clipboard. Text it to the student.', 'success');
  });
}

function resetForm(){
  document.getElementById('filesContainer').classList.add('hidden');
  document.getElementById('resultContainer').classList.add('hidden');
  document.getElementById('studentEmail').value = '';
  selectedFile = null;
  candidateFiles = [];
  lastResult = null;
  clearStatus();
}
</script>
</body>
</html>
