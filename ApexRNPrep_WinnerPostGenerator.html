<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex RN Prep — Winner Post Generator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#eef2f7;min-height:100vh;padding:28px 20px;display:flex;align-items:flex-start;justify-content:center}
.app{display:grid;grid-template-columns:320px 1fr;gap:22px;max-width:860px;width:100%}
.panel{background:white;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.09);padding:28px 26px}
.panel h2{font-size:16px;font-weight:700;color:#1a2d5a}
.version{font-size:11px;color:#9ca3af;margin-top:3px}
hr{border:none;border-top:1px solid #e5e7eb;margin:14px 0}
label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;margin-top:13px}
input[type="text"],input[type="number"],select{width:100%;padding:9px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:14px;font-family:inherit;color:#111;outline:none;transition:border-color .2s;background:white}
input:focus,select:focus{border-color:#1a2d5a}
.upload-area{border:2px dashed #d1d5db;border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.upload-area:hover{border-color:#1a2d5a;background:#f8faff}
.upload-area input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.up-icon{font-size:24px;margin-bottom:4px}.up-label{font-size:12px;color:#6b7280}
#photoThumb{width:64px;height:64px;border-radius:50%;object-fit:cover;margin:6px auto 0;display:block;border:2px solid #d4af37}
.btn{width:100%;padding:12px;background:#1a2d5a;color:white;font-size:14px;font-weight:700;border:none;border-radius:10px;cursor:pointer;margin-top:16px;font-family:inherit;transition:background .2s}
.btn:hover{background:#243e7a}
.back-link{display:block;text-align:center;margin-top:10px;font-size:12px;color:#9ca3af;text-decoration:none}
.back-link:hover{color:#1a2d5a}
#status{font-size:12px;text-align:center;margin-top:8px;min-height:18px}
#status.success{color:#16a34a;font-weight:700}
.preview-panel{display:flex;flex-direction:column;align-items:center}
.canvas-wrap{width:100%;max-width:370px;border-radius:12px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.22);margin-top:4px}
#previewCanvas{width:100%;display:block}
.preview-note{font-size:11px;color:#9ca3af;margin-top:8px;text-align:center}
@media(max-width:680px){.app{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <div class="panel">
    <h2>Winner Post Generator</h2>
    <p class="version">v30 &mdash; May 2026</p>
    <hr>
    <label>Student Photo</label>
    <div class="upload-area">
      <input type="file" id="photoInput" accept="image/*" onchange="handlePhoto(event)">
      <div class="up-icon" id="upIcon">&#128247;</div>
      <div class="up-label" id="upLabel">Click to upload headshot</div>
      <img id="photoThumb" style="display:none">
    </div>
    <label>Student Name</label>
    <input type="text" id="studentName" placeholder="e.g. Mettilda" oninput="go()">
    <label>Pronoun</label>
    <select id="pronoun" onchange="go()">
      <option value="She">She</option>
      <option value="He">He</option>
      <option value="They">They</option>
    </select>
    <label>Achievement</label>
    <select id="achievement" onchange="onAch()">
      <option value="questions">Passed in just X Questions !!!</option>
      <option value="first">Passed on the first attempt!</option>
      <option value="none">(No tagline)</option>
    </select>
    <div id="qWrap">
      <label>Number of Questions</label>
      <input type="number" id="qCount" value="85" min="1" max="145" oninput="go()">
    </div>
    <button class="btn" onclick="dlPost()">&#8675; Download for Instagram</button>
    <a class="back-link" href="ApexRNPrep_Hub.html">&#8592; Back to Hub</a>
    <div id="status"></div>
  </div>
  <div class="panel preview-panel">
    <h2>Live Preview</h2>
    <p class="version">739 &times; 892 px &nbsp;&middot;&nbsp; Instagram-ready PNG</p>
    <hr>
    <div class="canvas-wrap">
      <canvas id="previewCanvas" width="700" height="874"></canvas>
    </div>
    <p class="preview-note">Preview updates as you type</p>
  </div>
</div>

const CW=700,CH=874,CX=350,CY=424,CR=200;

const mtFace  =new FontFace('Montserrat','url(data:font/woff;base64,'+MT_B64+')',{weight:'700'});
const loraFace=new FontFace('Lora','url(data:font/woff;base64,'+LORA_B64+')',{weight:'400',style:'italic'});
Promise.all([mtFace.load(),loraFace.load()]).then(([f1,f2])=>{document.fonts.add(f1);document.fonts.add(f2);}).catch(e=>console.warn(e));

const tmplImg=new Image();tmplImg.src='data:image/png;base64,'+TMPL_B64;
let photoImg=null,renderTimer=null;

function onAch(){document.getElementById('qWrap').style.display=document.getElementById('achievement').value==='questions'?'block':'none';go();}
function handlePhoto(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{const img=new Image();img.onload=()=>{photoImg=img;
    const th=document.getElementById('photoThumb');th.src=ev.target.result;th.style.display='block';
    document.getElementById('upIcon').style.display='none';
    document.getElementById('upLabel').textContent='Photo ready ✓';go();};
    img.src=ev.target.result;};reader.readAsDataURL(file);}
function go(){clearTimeout(renderTimer);renderTimer=setTimeout(render,80);}
function buildTag(){
  const p=document.getElementById('pronoun').value,a=document.getElementById('achievement').value,q=document.getElementById('qCount').value||'85';
  if(a==='none')return '';
  if(a==='questions')return p+' passed in just '+q+' Questions !!!';
  if(a==='first')return p+' Passed on the first attempt!';
  return '';}

async function render(){
  await document.fonts.ready;
  if(!tmplImg.complete||tmplImg.naturalWidth===0)await new Promise(r=>{tmplImg.onload=r;});
  const canvas=document.getElementById('previewCanvas');
  const ctx=canvas.getContext('2d');
  const name=(document.getElementById('studentName').value.trim()||'Student Name').toUpperCase()+', RN';
  const tag=buildTag();

  // Reset all state first
  ctx.save();
  ctx.shadowBlur=0;ctx.shadowColor='transparent';ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;

  // 1. Template (ribbon reconstructed from 5 images)
  ctx.drawImage(tmplImg,0,0,CW,CH);
  ctx.restore();

  // 1b/1c: Ribbon is now baked into the template (v15) — no canvas redraw needed.

  // 2. Photo — isolated save/restore, no shadow
  ctx.save();
  ctx.shadowBlur=0;ctx.shadowColor='transparent';
  ctx.beginPath();ctx.arc(CX,CY,CR,0,Math.PI*2);ctx.clip();
  if(photoImg){
    const s=Math.max((CR*2)/photoImg.width,(CR*2)/photoImg.height);
    ctx.drawImage(photoImg,CX-photoImg.width*s/2,CY-photoImg.height*s/2,photoImg.width*s,photoImg.height*s);
  }else{
    ctx.fillStyle='#182080';ctx.fillRect(CX-CR,CY-CR,CR*2,CR*2);
    ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='14px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('Upload photo above',CX,CY);
  }
  ctx.restore();

  // 3. Name on ribbon — clean white over the baked-in gold band, thin outline for legibility
  // Band is at y=644-700 in the v15 template, center y=672. Name x-center is at CX.
  ctx.save();
  ctx.shadowBlur=0;ctx.shadowColor='transparent';ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;
  let fs=40;
  ctx.font='700 '+fs+'px Montserrat,"Arial Black",sans-serif';
  while(ctx.measureText(name).width>300&&fs>16){fs-=2;ctx.font='700 '+fs+'px Montserrat,"Arial Black",sans-serif';}
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.strokeStyle='rgba(60,40,0,0.55)';
  ctx.lineWidth=2;
  ctx.lineJoin='round';
  ctx.strokeText(name,CX,672);
  ctx.fillStyle='white';
  ctx.fillText(name,CX,672);
  ctx.restore();

  // 4. Tagline — skip if empty (user selected "No tagline")
  if(tag){
    ctx.save();
    ctx.shadowBlur=0;ctx.shadowColor='transparent';ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;
    ctx.font='italic 400 22px Lora,Georgia,serif';
    ctx.fillStyle='white';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='rgba(10,20,60,0.8)';
    ctx.shadowBlur=2;ctx.shadowOffsetX=0;ctx.shadowOffsetY=1;
    ctx.fillText(tag,CX,762);
    ctx.restore();
  }
}

function dlPost(){
  const canvas=document.getElementById('previewCanvas');
  const name=(document.getElementById('studentName').value.trim()||'winner').replace(/[^a-zA-Z0-9]/g,'_');
  const a=document.createElement('a');a.download='WinnerPost_'+name+'.png';
  a.href=canvas.toDataURL('image/png');a.click();
  const s=document.getElementById('status');
  s.className='success';s.textContent='✓ Downloaded! Ready for Instagram.';
  setTimeout(()=>{s.textContent='';s.className='';},3500);}
go();
</script>
